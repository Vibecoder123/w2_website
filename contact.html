<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | OMC Property Ventures Ltd</title>
  <meta name="description" content="Get in touch with OMC Property Ventures Ltd for renovation work in Basingstoke & North Hampshire.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <nav class="primary-nav" aria-label="Primary">
      <a href="index.html" class="brand">OMC Property Ventures</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section class="contact-content">
      <h1>Get In Touch</h1>
      <p>Have a project in mind? Send us a few details and we'll get back to you.</p>

      <form class="contact-form">
        <div class="form-field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <button type="submit" class="cta-button">Send Message</button>
      </form>
    </section>

  </main>

  <footer class="site-footer">
    <p class="footer-brand">OMC Property Ventures Ltd</p>
    <p>Serving Basingstoke &amp; North Hampshire</p>
    <p><a href="tel:07792324526">07792 324526</a></p>
    <p class="copyright">&copy; 2026 OMC Property Ventures Ltd</p>
  </footer>

</body>
</html>
